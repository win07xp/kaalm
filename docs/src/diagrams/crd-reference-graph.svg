000" font-family="Helvetica" font-size="11" font-style="italic" lengthAdjust="spacing" textLength="3.4966" x="359.3242" y="162.0151">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="11" font-style="italic" lengthAdjust="spacing" textLength="24.5728" x="362.8208" y="162.0151">asks</text></g><!--reverse link mp to at--><g class="link" data-entity-1="ent0003" data-entity-2="ent0008" data-link-type="dependency" data-source-line="41" id="lnk16"><path d="M395.3627,111.0492 C394.8227,141.9792 394.09,183.89 393.55,214.86" fill="none" id="mp-backto-at" style="stroke:#B71C1C;stroke-width:2;"/><polygon fill="#B71C1C" points="395.45,106.05,391.2935,114.9788,395.3627,111.0492,399.2923,115.1185,395.45,106.05" style="stroke:#B71C1C;stroke-width:2;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="64.3564" x="395" y="155.7104">providerRef</text></g><g class="legend" data-source-line="43"><rect fill="none" height="107.7813" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="695.877" x="46.0159" y="456"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="652.8799" x="51.0159" y="473.9951">Grey = cluster-scoped policy | Purple = namespaced workload | Orange = not an Kaalm CRD</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="296.2012" x="51.0159" y="490.292">Arrows point from a field to what it names</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="211.5449" x="51.0159" y="506.5889">Both red edges must pass:</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.2627" x="267.011" y="506.5889">the class must allow the provider</text><text fill="#000000" font-family="Helvetica" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="26.3389" x="504.7239" y="506.5889">and</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.3799" x="535.5129" y="506.5889">the workload must ask for it.</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="649.9336" x="51.0159" y="522.8857">A third gate is not drawable here, because it is not a reference: the ModelProvider must also</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="224.3623" x="51.0159" y="539.1826">admit the caller's namespace in</text><text fill="#000000" font-family="Helvetica" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="143.541" x="279.8284" y="539.1826">allowedNamespaces</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="423.3694" y="539.1826">.</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="216.7949" x="51.0159" y="555.4795">ModelProvider is recursive:</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="267.8108" y="555.4795">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="54.5576" x="272.261" y="555.4795">fallback</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="382.8398" x="331.2688" y="555.4795">is a tree, walked depth-first, and rule 11 forbids cycles</text></g><?plantuml-src hLPDZzis4BthLqopXqq4sxAJTP9gam8RPxS5YhP1abiQ5BGujWbJf41IgnXD_tk7fBviTr6ag7sHA7BUcvatCxo4dtG3ReUm4VS8FpCcIrYzVsl1u0ODgW81MR43JNlC12fcd712A-ImFe0jT8Mpv18-wDhGLhq1Psgtou7hmcRM55cXoKRbB3qOd7Pliv8dtmbLo9eZ_67TGUAigakP97Ol5A6m4fJcQB62fylHec5gxnUNy_4Y5ewfhKJuCm4mkbPyfOr20rV9NmdHc_O_84Zhq4m3TPv39PdRQ5DETUETghGKnM5q81cCFqhJLJmT7KzJUDmT1uT4X6pO9u-0sGvcpHI72oaKvj_V-l-rVvvnPdV8hnr-SVao_2BpCTJD5
apiVersion: agentry.io/v1alpha1
kind: Agent
metadata:
  name: support-assistant
  namespace: default
spec:
  agentClassRef:
    name: standard
  image: ghcr.io/win07xp/agent:latest
  providers:
    - providerRef:
        name: anthropic-shared
  persistence:
    enabled: true
    sizeGi: 10
  lifecycle:
    hibernationEnabled: true
    activitySource: gatewayTraffic

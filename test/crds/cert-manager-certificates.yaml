# Minimal cert-manager Certificate CRD for envtest only. The real CRD is
# installed by cert-manager in live clusters; tests need just enough schema to
# create Certificate objects and write their status (the suite plays the role
# of cert-manager by flipping Ready=True).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificates.cert-manager.io
spec:
  group: cert-manager.io
  names:
    kind: Certificate
    listKind: CertificateList
    plural: certificates
    singular: certificate
    shortNames: [cert, certs]
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true

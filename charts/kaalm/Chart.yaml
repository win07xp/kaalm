apiVersion: v2
name: kaalm
description: >-
  Kaalm, a Kubernetes-native operator that makes AI agents a first-class
  workload type. Installs the controller, the shared gateway, RBAC, and the
  cert-manager and trust-manager resources. Requires cert-manager,
  trust-manager, and a NetworkPolicy-enforcing CNI to be installed already.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"
keywords:
  - ai
  - agents
  - operator
  - llm
home: https://github.com/win07xp/kaalm
sources:
  - https://github.com/win07xp/kaalm

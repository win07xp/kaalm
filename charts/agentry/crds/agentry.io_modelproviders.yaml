---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: modelproviders.agentry.io
spec:
  group: agentry.io
  names:
    kind: ModelProvider
    listKind: ModelProviderList
    plural: modelproviders
    shortNames:
    - mp
    singular: modelprovider
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Healthy")].status
      name: Healthy
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelProvider is the Schema for the modelproviders API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModelProviderSpec is a platform-owned wrapper around one LLM provider: its
              endpoint, credentials, model catalog, tenancy, budget, and fallback tree.
              See docs/src/resources/modelprovider.md.
            properties:
              allowedNamespaces:
                description: |-
                  AllowedNamespaces are glob patterns; a caller's namespace must match one.
                  "*" allows all; empty allows none.
                items:
                  type: string
                type: array
              budget:
                description: Budget sets soft spend guardrails.
                properties:
                  clusterUSD:
                    description: ClusterUSD is an optional cluster-wide spend ceiling
                      for the period.
                    type: string
                  perNamespaceUSD:
                    description: |-
                      PerNamespaceUSD is the per-namespace spend ceiling for the period, as a
                      decimal string.
                    type: string
                  period:
                    default: none
                    description: Period is the budget accounting window.
                    enum:
                    - monthly
                    - weekly
                    - daily
                    - none
                    type: string
                  policies:
                    description: Policies fire actions as spend crosses thresholds.
                    items:
                      description: ModelProviderBudgetPolicy is a threshold action.
                      properties:
                        action:
                          description: Action taken at the threshold.
                          enum:
                          - block
                          - warn
                          - degrade
                          type: string
                        atPercent:
                          description: AtPercent is the utilization percentage at
                            which the action fires.
                          format: int32
                          maximum: 100
                          minimum: 0
                          type: integer
                        degradeTo:
                          description: |-
                            DegradeTo names a cheaper model id in this provider's catalog. Required
                            when action is degrade; validated at reconcile time (rule 18).
                          type: string
                      required:
                      - action
                      - atPercent
                      type: object
                    type: array
                type: object
              credentialsRef:
                description: |-
                  CredentialsRef points at the Secret key holding the provider credential,
                  read by the gateway in the operator namespace.
                properties:
                  key:
                    description: Key within the Secret's data.
                    minLength: 1
                    type: string
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                required:
                - key
                - name
                type: object
              endpoint:
                description: Endpoint is the provider base URL. Must be HTTPS.
                pattern: ^https://
                type: string
              fallback:
                description: |-
                  Fallback names providers tried when this one fails. Each may declare its
                  own fallback, forming a tree walked depth-first. Must be acyclic and share
                  this provider's type.
                items:
                  description: |-
                    LocalObjectReference names another Agentry resource by name, in the same scope
                    as the referrer (same namespace for namespaced kinds, cluster-wide for
                    cluster-scoped kinds). Used for agentClassRef, providerRef, allowedProviders
                    entries, fallback entries, and agentRef.
                  properties:
                    name:
                      description: Name of the referenced object.
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              healthCheck:
                description: |-
                  HealthCheck configures the periodic upstream liveness probe. A nil block
                  defaults to an enabled probe at reconcile time (the CRD default on enabled
                  only fires when the block is present).
                properties:
                  enabled:
                    default: true
                    description: |-
                      Enabled runs the periodic upstream liveness probe. Set false to disable it.
                      The json tag deliberately has no omitempty: a serialized explicit false
                      must survive the wire, or the CRD default would overwrite it.
                    type: boolean
                  intervalSeconds:
                    format: int32
                    type: integer
                  timeoutSeconds:
                    format: int32
                    type: integer
                type: object
              models:
                description: Models is the catalog this provider serves, keyed by
                  id.
                items:
                  description: |-
                    ModelProviderModel is one entry in the catalog. Costs are decimal USD strings
                    per one million tokens.
                  properties:
                    costPer1MInputTokens:
                      description: CostPer1MInputTokens is USD per million input tokens,
                        as a decimal string.
                      type: string
                    costPer1MOutputTokens:
                      description: CostPer1MOutputTokens is USD per million output
                        tokens, as a decimal string.
                      type: string
                    displayName:
                      description: DisplayName is a human-readable label.
                      type: string
                    id:
                      description: ID is the model identifier as sent to the provider.
                      minLength: 1
                      type: string
                  required:
                  - id
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - id
                x-kubernetes-list-type: map
              rateLimits:
                description: RateLimits set the cluster-wide request and token ceilings.
                properties:
                  requestsPerMinute:
                    format: int32
                    type: integer
                  tokensPerMinute:
                    format: int32
                    type: integer
                type: object
              type:
                description: Type selects the provider protocol.
                enum:
                - anthropic
                - openai
                - google-vertex
                - openai-compatible
                type: string
            required:
            - credentialsRef
            - endpoint
            - type
            type: object
          status:
            description: ModelProviderStatus is the observed state of a ModelProvider.
            properties:
              budgetUsage:
                description: BudgetUsage is per-namespace spend for the current period.
                items:
                  description: ModelProviderBudgetUsage is per-namespace spend.
                  properties:
                    namespace:
                      type: string
                    percentUsed:
                      description: PercentUsed is spend against the per-namespace
                        ceiling.
                      format: int32
                      type: integer
                    period:
                      type: string
                    spentUSD:
                      description: SpentUSD is spend so far this period, as a decimal
                        string.
                      type: string
                    state:
                      description: State is the enforcement state for this namespace.
                      enum:
                      - Normal
                      - Throttled
                      - Blocked
                      type: string
                  required:
                  - namespace
                  - percentUsed
                  - period
                  - spentUSD
                  - state
                  type: object
                type: array
              clusterSpentUSD:
                description: ClusterSpentUSD is total spend across namespaces for
                  the period.
                type: string
              conditions:
                description: Conditions report Ready and Healthy.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

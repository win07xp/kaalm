name: Release

# Cutting a release is a single action: push a semver tag.
#   git tag v0.2.0 && git push origin v0.2.0
# This builds and pushes the multi-arch controller and gateway images and the
# Helm chart to ghcr, then creates the GitHub release. Pre-release tags
# (v0.2.0-rc.1) are matched too and are the safe way to smoke-test: their
# images/chart carry the pre-release version and never move the `latest` tag.
# See RELEASING.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  packages: write # push images and the chart to ghcr

env:
  REGISTRY: ghcr.io

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: controller
            binary: manager
          - component: gateway
            binary: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3 # arm64 emulation for the cross build
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kaalm-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: BINARY=${{ matrix.binary }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: azure/setup-helm@v4

      - name: Package the chart with the tag version stamped in
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make chart-sync
          helm package charts/kaalm --version "$VERSION" --app-version "$VERSION" --destination dist

      - name: Push the chart to ghcr as OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" \
            --username "${{ github.actor }}" --password-stdin
          helm push dist/kaalm-*.tgz "oci://${REGISTRY}/${{ github.repository_owner }}/charts"

      - uses: actions/upload-artifact@v4
        with:
          name: chart
          path: dist/kaalm-*.tgz

  release:
    runs-on: ubuntu-latest
    needs: [images, chart]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: chart
          path: dist

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Kaalm $GITHUB_REF_NAME" \
            --generate-notes \
            dist/kaalm-*.tgz

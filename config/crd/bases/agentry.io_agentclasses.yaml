                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    type: array
                  pullPolicy:
                    description: PullPolicy is the image pull policy for workload
                      containers.
                    type: string
                type: object
              lifecycle:
                description: Lifecycle sets idle, hibernation, and wake defaults and
                  ceilings.
                properties:
                  defaultHibernationDelay:
                    type: string
                  defaultIdleTimeout:
                    type: string
                  defaultWakeTimeout:
                    type: string
                  hibernationAllowed:
                    description: HibernationAllowed permits workloads of this class
                      to enable hibernation.
                    type: boolean
                  maxHibernationDelay:
                    type: string
                  maxIdleTimeout:
                    type: string
                  maxWakeTimeout:
                    type: string
                  terminationGracePeriodSeconds:

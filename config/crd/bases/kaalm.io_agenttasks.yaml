                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase.
                type: string
              podName:
                type: string
              retries:
                description: Retries counts Pod recreations under backoffLimit.
                format: int32
                type: integer
              startTime:
                format: date-time
                type: string
            type: object

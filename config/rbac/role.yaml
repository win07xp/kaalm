---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentry.io
  resources:
  - agentclasses
  - agents
  - modelproviders
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentry.io
  resources:
  - agentclasses/finalizers
  - agents/finalizers
  - modelproviders/finalizers
  verbs:
  - update
- apiGroups:
  - agentry.io
  resources:
  - agentclasses/status
  - agents/status
  - modelproviders/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - agentry.io
  resources:
  - agenttasks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

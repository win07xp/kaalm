version: "2"
run:
  allow-parallel-runners: true
# prealloc is deliberately not enabled: every finding it raised was a composite
# literal followed by an append, where the suggested make()+append rewrite costs
# readability for an allocation that is irrelevant at these sizes (a handful of
# env vars or policy rules, built once per reconcile).
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    goconst:
      # Repeated literals in tests are usually clearer inline than hoisted into
      # constants; this is what golangci-lint's own default exclusions did in v1.
      ignore-tests: true
    revive:
      rules:
        - name: comment-spacings
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
